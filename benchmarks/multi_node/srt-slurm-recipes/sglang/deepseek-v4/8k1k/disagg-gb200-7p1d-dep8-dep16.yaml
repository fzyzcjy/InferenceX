name: "dsv4-sglang-disagg-gb200-7p1d-dep8-dep16"

# 8k/1k max-throughput topology: 7 prefill (DP=8 EP=8) + 1 wide decode
# (DP=16 EP=16). 18 nodes — full GB200 cluster. Targets conc 4096-8192.
# Per-worker tunings identical to the 3p1d sibling; only prefill_workers
# and prefill_nodes scale up.
#
# See ../1k1k/disagg-gb200-1p1d-dep8-tep8.yaml for the upstream-reference
# list. Topology mirrors the dsv4-fp4-gb200-dynamo-vllm sibling.

model:
  path: "deepseek-v4-pro"
  container: "lmsysorg/sglang:deepseek-v4-grace-blackwell"
  precision: "fp4"

# See ../1k1k/disagg-gb200-1p1d-dep8-tep8.yaml for the dynamo pin rationale.
dynamo:
  hash: 21f135f5edf40e12e6ff5db2b462d862a6d6ab9b
  install: true

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 1440
  interval_seconds: 10

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 14
  decode_nodes: 2
  prefill_workers: 7
  decode_workers: 1
  gpus_per_prefill: 8
  gpus_per_decode: 8

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: sglang

  prefill_environment:
    PYTHONUNBUFFERED: "1"
    SGLANG_JIT_DEEPGEMM_PRECOMPILE: "0"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    SGLANG_DEEPEP_NUM_MAX_DISPATCH_TOKENS_PER_RANK: "1024"

  decode_environment:
    PYTHONUNBUFFERED: "1"
    SGLANG_JIT_DEEPGEMM_PRECOMPILE: "0"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    SGLANG_DEEPEP_NUM_MAX_DISPATCH_TOKENS_PER_RANK: "1024"

  sglang_config:
    prefill:
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      trust-remote-code: true
      tensor-parallel-size: 8
      moe-dense-tp-size: 1
      enable-dp-attention: true
      dp-size: 8
      moe-runner-backend: "flashinfer_mxfp4"
      chunked-prefill-size: 4096
      disable-flashinfer-autotune: true
      disable-radix-cache: true
      mem-fraction-static: 0.82
      context-length: 9280
      max-running-requests: 8
      stream-interval: 50
      decode-log-interval: 1000
      disaggregation-mode: "prefill"
      disaggregation-transfer-backend: nixl

    decode:
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      trust-remote-code: true
      tensor-parallel-size: 8
      moe-dense-tp-size: 1
      enable-dp-attention: true
      dp-size: 8
      moe-runner-backend: "flashinfer_mxfp4"
      chunked-prefill-size: 4096
      disable-flashinfer-autotune: true
      disable-radix-cache: true
      mem-fraction-static: 0.82
      context-length: 9280
      max-running-requests: 256
      cuda-graph-max-bs: 256
      stream-interval: 50
      decode-log-interval: 1000
      disaggregation-mode: "decode"
      disaggregation-transfer-backend: nixl

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "4096x8192"
  req_rate: "inf"
  use_chat_template: false
