name: "dsv4-sglang-disagg-gb200-1p1d-dep8-tep8"

# 8k/1k variant of the 1k/1k 1p1d-dep8-tep8 recipe. Same topology and
# tuning; only context-length grows from 3072 (1k+1k+pad) to 9280
# (8k+1k+pad), and prefill max-running-requests halves to keep the per-
# rank prefill working set inside the GPU memory budget.
#
# See ../1k1k/disagg-gb200-1p1d-dep8-tep8.yaml for the full upstream-
# reference list (PR #69 GB200 agg, PR #75 GB300 disagg).

model:
  path: "deepseek-v4-pro"
  container: "lmsysorg/sglang:deepseek-v4-grace-blackwell"
  precision: "fp4"

dynamo:
  version: 0.8.1

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 1440
  interval_seconds: 10

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 2
  decode_nodes: 2
  prefill_workers: 1
  decode_workers: 1
  gpus_per_prefill: 8
  gpus_per_decode: 8

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: sglang

  prefill_environment:
    PYTHONUNBUFFERED: "1"
    SGLANG_JIT_DEEPGEMM_PRECOMPILE: "0"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"

  decode_environment:
    PYTHONUNBUFFERED: "1"
    SGLANG_JIT_DEEPGEMM_PRECOMPILE: "0"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"

  sglang_config:
    prefill:
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      trust-remote-code: true
      tensor-parallel-size: 8
      dp-size: 8
      ep-size: 8
      enable-dp-attention: true
      moe-a2a-backend: "deepep"
      moe-runner-backend: "flashinfer_mxfp4"
      chunked-prefill-size: 4096
      disable-flashinfer-autotune: true
      disable-radix-cache: true
      mem-fraction-static: 0.82
      context-length: 9280
      max-running-requests: 8
      stream-interval: 50
      decode-log-interval: 1000
      disaggregation-mode: "prefill"
      disaggregation-transfer-backend: nixl

    decode:
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      trust-remote-code: true
      tensor-parallel-size: 8
      moe-runner-backend: "flashinfer_mxfp4"
      chunked-prefill-size: 4096
      disable-flashinfer-autotune: true
      disable-radix-cache: true
      mem-fraction-static: 0.82
      context-length: 9280
      max-running-requests: 64
      cuda-graph-max-bs: 64
      stream-interval: 50
      decode-log-interval: 1000
      disaggregation-mode: "decode"
      disaggregation-transfer-backend: nixl

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "1x4x8x16x32x64"
  req_rate: "inf"
  use_chat_template: false
