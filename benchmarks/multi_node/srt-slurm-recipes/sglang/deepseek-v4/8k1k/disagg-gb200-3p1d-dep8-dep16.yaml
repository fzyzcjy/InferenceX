name: "dsv4-sglang-disagg-gb200-3p1d-dep8-dep16"

# 8k/1k mid-throughput topology: 3 prefill (DP=8 EP=8) + 1 wide decode
# (DP=16 EP=16). 10 nodes. Targets conc 512-1024 — 8k prompts saturate
# a single prefill worker below conc=512.
#
# See ../1k1k/disagg-gb200-1p1d-dep8-tep8.yaml for the upstream-reference
# list. Topology mirrors the dsv4-fp4-gb200-dynamo-vllm sibling.

model:
  path: "deepseek-v4-pro"
  container: "lmsysorg/sglang:deepseek-v4-grace-blackwell"
  precision: "fp4"

dynamo:
  version: 0.8.1

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 1440
  interval_seconds: 10

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 6
  decode_nodes: 4
  prefill_workers: 3
  decode_workers: 1
  gpus_per_prefill: 8
  gpus_per_decode: 16

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: sglang

  prefill_environment:
    PYTHONUNBUFFERED: "1"
    SGLANG_JIT_DEEPGEMM_PRECOMPILE: "0"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"

  decode_environment:
    PYTHONUNBUFFERED: "1"
    SGLANG_JIT_DEEPGEMM_PRECOMPILE: "0"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"

  sglang_config:
    prefill:
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      trust-remote-code: true
      tensor-parallel-size: 8
      dp-size: 8
      ep-size: 8
      enable-dp-attention: true
      moe-a2a-backend: "deepep"
      moe-runner-backend: "flashinfer_mxfp4"
      chunked-prefill-size: 4096
      disable-flashinfer-autotune: true
      disable-radix-cache: true
      mem-fraction-static: 0.82
      context-length: 9280
      max-running-requests: 4
      stream-interval: 50
      decode-log-interval: 1000
      disaggregation-mode: "prefill"
      disaggregation-transfer-backend: nixl

    decode:
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      trust-remote-code: true
      tensor-parallel-size: 16
      dp-size: 16
      ep-size: 16
      enable-dp-attention: true
      moe-a2a-backend: "deepep"
      moe-runner-backend: "flashinfer_mxfp4"
      chunked-prefill-size: 4096
      disable-flashinfer-autotune: true
      disable-radix-cache: true
      mem-fraction-static: 0.82
      context-length: 9280
      max-running-requests: 256
      cuda-graph-max-bs: 256
      stream-interval: 50
      decode-log-interval: 1000
      disaggregation-mode: "decode"
      disaggregation-transfer-backend: nixl

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "512x1024"
  req_rate: "inf"
  use_chat_template: false
